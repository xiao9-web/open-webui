services:
  routellm:
    build:
      context: ./routellm
    container_name: routellm
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_BASE=http://ollama:11434
      - ROUTELLM_ROUTER=${ROUTELLM_ROUTER:-mf}
      - ROUTELLM_STRONG_MODEL=${ROUTELLM_STRONG_MODEL:-gpt-4o}
      - ROUTELLM_WEAK_MODEL=${ROUTELLM_WEAK_MODEL:-ollama_chat/qwen3-coder-next}
      # threshold: 0.0=全走本地 / 0.3=均衡 / 1.0=全走API
      - ROUTELLM_THRESHOLD=${ROUTELLM_THRESHOLD:-0.3}
    volumes:
      - routellm-cache:/root/.cache/huggingface
    ports:
      - "6060:6060"
    depends_on:
      - ollama
    restart: unless-stopped

  open-webui:
    environment:
      # 指向 RouteLLM，由它决定走 GPT-4o 还是 qwen3-coder-next
      - OPENAI_API_BASE_URL=http://routellm:6060/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - routellm

volumes:
  routellm-cache: {}
