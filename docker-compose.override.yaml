# docker compose 自动加载此文件，无需额外 -f 参数
# 启动: docker compose up -d

services:
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    volumes:
      - ./pipelines:/app/pipelines
    ports:
      - "9099:9099"
    environment:
      - STRONG_API_URL=${STRONG_API_URL:-https://api.siliconflow.cn/v1}
      - STRONG_API_KEY=${STRONG_API_KEY:-}
      - STRONG_MODEL=${STRONG_MODEL:-deepseek-ai/DeepSeek-V3}
      - OLLAMA_URL=http://ollama:11434
      - LOCAL_MODEL=${LOCAL_MODEL:-qwen3-coder-next}
    depends_on:
      - ollama
    restart: unless-stopped

  open-webui:
    environment:
      - OPENAI_API_BASE_URL=http://pipelines:9099
      - OPENAI_API_KEY=pipelines-internal
    depends_on:
      - pipelines
